# ################################################
# #          HidePlayer Configuration            #
# ################################################

# Configuration version (do not change)
config-version: 0.1

# Enable debug messages in console
debug: true

# Check for new updates on GitHub
check_updates: true

# Plugin prefix
prefix: "&8[&bHidePlayer&8] &r"

# Select language (langs/en.yml, langs/es.yml, etc.)
language: "en"

# Chat format for administrators to see the hidden player
# %1$s is replaced by the Nick + Prefix format of other plugins and then the original is appended
# Allows using PlaceholderAPI placeholders
admin-chat-format: "%1$s &8(%hideplayer_original_name%)&r"

# Sounds
sounds:
  hide:
    enabled: true
    sound: "ENTITY_ENDERMAN_TELEPORT"
    volume: 1.0
    pitch: 1.0
  show:
    enabled: true
    sound: "ENTITY_PLAYER_LEVELUP"
    volume: 1.0
    pitch: 1.0
  error:
    enabled: true
    sound: "ENTITY_VILLAGER_NO"
    volume: 1.0
    pitch: 1.0

# Admin Panel GUI configuration
admin-panel:
  title: "&cAdmin Panel - Page {page}"
  size: 54
  next-page-item:
    material: "ARROW"
    name: "&aNext Page"
    lore:
      - "&7Click to go to the next page!"
  prev-page-item:
    material: "ARROW"
    name: "&cPrevious Page"
    lore:
      - "&7Click to go to the previous page!"
  player-head:
    name: "&a{original_name}"
    lore:
      - "&7Nick: &f{nick}"
      - "&7Skin: &f{skin}"
      - "&8UUID: {uuid}"
